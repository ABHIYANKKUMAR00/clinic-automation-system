<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Clinic — AI Booking Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── STANDALONE CHATBOT PAGE STYLES ── */
    body {
      background: linear-gradient(135deg, #eef4fd 0%, #f0f9ff 60%, #e8f5e9 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 40px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .page-header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 8px;
    }

    .page-header .logo svg { width: 36px; height: 36px; }

    .page-header p {
      color: var(--gray-600);
      font-size: 0.93rem;
    }

    .standalone-chat {
      width: 100%;
      max-width: 520px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(0,0,0,0.13);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--gray-200);
      min-height: 620px;
    }

    .standalone-chat .chat-header { flex-shrink: 0; }

    .standalone-chat .api-key-bar { flex-shrink: 0; }

    .standalone-chat .chat-messages {
      flex: 1;
      min-height: 380px;
      max-height: 480px;
    }

    .standalone-chat .chat-input-area { flex-shrink: 0; }

    .info-cards {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 520px;
      width: 100%;
    }

    .info-card {
      flex: 1;
      min-width: 140px;
      background: var(--white);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 0.82rem;
    }

    .info-card-icon {
      width: 36px; height: 36px;
      background: var(--primary-light);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-card-icon svg { width: 18px; height: 18px; color: var(--primary); }
    .info-card strong { display: block; font-size: 0.83rem; color: var(--gray-800); }
    .info-card span { color: var(--gray-600); font-size: 0.78rem; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 0.87rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 18px;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 10px; }
    .back-link svg { width: 16px; height: 16px; }

    @media (max-width: 560px) {
      body { padding: 20px 10px 32px; }
      .standalone-chat { border-radius: 14px; }
      .standalone-chat .chat-messages { max-height: 340px; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to City Clinic
    </a>
    <div>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1a6fc4"/><path d="M16 8v16M8 16h16" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>
        City Clinic
      </a>
    </div>
    <p>AI-powered appointment booking · Available 24/7</p>
  </div>

  <div class="standalone-chat">
    <!-- HEADER -->
    <div class="chat-header">
      <div class="chat-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="12" rx="2"/><path d="M8 19h8M12 15v4"/></svg>
      </div>
      <div class="chat-header-info">
        <h4>City Clinic AI Assistant</h4>
        <span><span class="online-dot"></span> Online — Powered by Llama 3.3 (Groq)</span>
      </div>
      <button class="chat-close" onclick="resetChat()" aria-label="Reset chat" title="Reset conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
      </button>
    </div>

    <!-- API KEY BAR -->
    <div class="api-key-bar">
      <input type="password" id="api-key-input" placeholder="Paste your Groq API key (gsk_...)" autocomplete="off" />
      <button onclick="saveApiKey()" id="save-key-btn">Save Key</button>
      <span id="key-status" class="api-key-saved" style="display:none">✓ Ready</span>
    </div>

    <!-- MESSAGES -->
    <div class="chat-messages" id="chat-messages"></div>

    <!-- INPUT -->
    <div class="chat-input-area">
      <textarea
        id="chat-input"
        placeholder="Type your message and press Enter…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- INFO CARDS -->
  <div class="info-cards">
    <div class="info-card">
      <div class="info-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div>
        <strong>Secure</strong>
        <span>Your key stays in-browser only</span>
      </div>
    </div>
    <div class="info-card">
      <div class="info-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div>
        <strong>Fast Booking</strong>
        <span>Confirmed in under 2 minutes</span>
      </div>
    </div>
    <div class="info-card">
      <div class="info-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div>
        <strong>AI Powered</strong>
        <span>GPT-4o-mini assistant</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
